name: Run Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full tag history for the pack step

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Execute xUnit Tests
        run: |
          dotnet test --configuration Release --no-build --verbosity normal \
          --filter "Category!=Integration"

      - name: Pack (verify packability)
        run: dotnet pack --configuration Release --no-build --output ./nupkgs

  integration-tests:
    name: Integration Tests (${{ matrix.micropython-version }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        micropython-version:
          - v1.19.1
          - v1.20.0
          - v1.21.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Cache MicroPython firmware
        uses: actions/cache@v4
        with:
          path: /tmp/rp2040sharp-firmware-cache
          key: micropython-firmware-${{ matrix.micropython-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Integration Tests
        run: |
          dotnet test tests/RP2040Sharp.IntegrationTests/ \
            --configuration Release --no-build --verbosity normal \
            --filter "Category=Integration"
